<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jensen Decor</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    .brand-card {
      transition: transform 0.3s ease-in-out;
    }

    .brand-card:hover {
      transform: scale(1.05);
      cursor: pointer;
    }

    .dropdown-menu-full {
      width: 100vw;
      left: 0;
      right: 0;
      top: 100%;
    }

    .dropdown-menu-full .container-fluid {
      padding: 20px;
    }

    .brand-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Jensen Decor</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="#">Home</a>
          </li>

          <!-- Brands Dropdown -->
          <li class="nav-item dropdown position-static">
            <a
              class="nav-link dropdown-toggle"
              href="#"
              role="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              Brands
            </a>
            <div class="dropdown-menu dropdown-menu-full bg-dark border-0 rounded-0 mt-0">
              <div class="container-fluid">
                <div class="row text-center justify-content-center">
                  <!-- Brand 1 -->
                  <div class="col-12 col-sm-6 col-md-4 col-lg-3 p-3 bg-secondary-subtle brand-card rounded-4 m-2">
                    <img
                      src="123.jpg"
                      alt="Gloster Logo"
                      class="img-fluid rounded-circle mb-3 brand-img"
                    />
                    <h5 class="text-white">Gloster</h5>
                  </div>

                  <!-- Brand 2 -->
                  <div class="col-12 col-sm-6 col-md-4 col-lg-3 p-3 bg-secondary-subtle brand-card rounded-4 m-2">
                    <img
                      src="wallpaper (14).jpg"
                      alt="Brand X Logo"
                      class="img-fluid rounded-circle mb-3 brand-img"
                    />
                    <h5 class="text-white">Brand X</h5>
                  </div>

                  <!-- Brand 3 -->
                  <div class="col-12 col-sm-6 col-md-4 col-lg-3 p-3 bg-secondary-subtle brand-card rounded-4 m-2">
                    <img
                      src="pexels-hngstrm-1901028.jpg"
                      alt="Decor Co Logo"
                      class="img-fluid rounded-circle mb-3 brand-img"
                    />
                    <h5 class="text-white">Decor Co</h5>
                  </div>
                </div>
              </div>
            </div>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">All Products</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Contact Us</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
